<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tableau Dashboard</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #ffffff;
      display: flex;
      justify-content: center;
    }

    /* Desktop layout */
    .page-container {
      width: 1000px;
      height: 100%;
      background: #ffffff;
      padding: 1px;
      box-sizing: border-box;
      overflow: hidden; /* keep for desktop */
    }

    .tableau-wrapper {
      width: 100%;
      height: 800px; /* slightly bigger than 800 to avoid clipping */
      overflow: hidden; /* keep for desktop */
      background: #ffffff;
    }

    footer {
      margin-top: 12px;
      text-align: center;
      font-family: "Futura", Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #666666;
    }

    /* ---------- Mobile ---------- */
    @media (max-width: 768px) {
      body {
        display: block;
      }

      .page-container {
        width: 100%;
        height: auto;
        min-height: 100vh;
        padding: 8px;
        overflow: visible !important; /* allow scrolling */
      }

      .tableau-wrapper {
        height: auto;
        overflow: visible !important;
      }

      footer {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="page-container">

    <div class="tableau-wrapper">
      <div class='tableauPlaceholder' id='viz1777315731607' style='position: relative'>
        <noscript>
          <a href='#'>
            <img alt='模型介绍'
              src='https://public.tableau.com/static/images/Cl/ClimateTransitionRiskAnalysisTool/sheet33/1_rss.png'
              style='border: none' />
          </a>
        </noscript>

        <object class='tableauViz' style='display:none;'>
          <param name='host_url' value='https%3A%2F%2Fpublic.tableau.com%2F' />
          <param name='embed_code_version' value='3' />
          <param name='site_root' value='' />
          <param name='name' value='ClimateTransitionRiskAnalysisTool/sheet33' />
          <param name='tabs' value='no' />
          <param name='toolbar' value='yes' />
          <param name='static_image'
            value='https://public.tableau.com/static/images/Cl/ClimateTransitionRiskAnalysisTool/sheet33/1.png' />
          <param name='animate_transition' value='yes' />
          <param name='display_static_image' value='yes' />
          <param name='display_spinner' value='yes' />
          <param name='display_overlay' value='yes' />
          <param name='display_count' value='yes' />
          <param name='language' value='zh-CN' />
        </object>
      </div>

      <script type='text/javascript'>
        var divElement = document.getElementById('viz1777315731607');
        var vizElement = divElement.getElementsByTagName('object')[0];

        if (divElement.offsetWidth > 800) {
          vizElement.style.width = '1000px';
          vizElement.style.height = '827px';
        } else if (divElement.offsetWidth > 500) {
          vizElement.style.width = '1000px';
          vizElement.style.height = '827px';
        } else {
          vizElement.style.width = '100%';
          vizElement.style.height = '2377px';
        }

        var scriptElement = document.createElement('script');
        scriptElement.src = 'https://public.tableau.com/javascripts/api/viz_v1.js';
        vizElement.parentNode.insertBefore(scriptElement, vizElement);
      </script>
    </div>

    <footer>
      © 2025 | Powered by Tableau Public
    </footer>

  </div>
</body>
</html>
